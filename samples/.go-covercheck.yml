# module name for path normalization (overrides automatic module inference)
# useful when all packages share a common parent directory
# default "" (uses automatic inference via longest common prefix)
# moduleName: "github.com/mach6/go-covercheck"

# global threshold % for statement coverage.
# global default for per file %, per package %, and total %.
# default 70.
# disabled with 0
statementThreshold: 65.0

# global threshold % for block coverage.
# global default for per file %, per package %, and total %
# default 50.
# disabled with 0
blockThreshold: 60.0

# global threshold % for line coverage.
# global default for per file %, per package %, and total %
# default 50.
# disabled with 0
lineThreshold: 50.0

# global threshold % for function coverage.
# global default for per file %, per package %, and total %
# default 60.
# disabled with 0
functionThreshold: 55.0

# sortBy condition for table output formats.
# file|blocks|statements|lines|functions|statement-percent|block-percent|line-percent|function-percent
# default file
sortBy: statement-percent

# sortOrder direction for table output formats
# asc|desc
# default asc
sortOrder: desc

# disable table output and only show the summary
# default false
noTable: false

# disable the summary and only show the table output
# default false
noSummary: false

# disable use of color
# default false
noColor: false

# the format for output
# table|json|yaml|md|html|csv|tsv
# default table
format: table

# the table style for table output format
# default|light|bold|rounded|double
# default light
tableStyle: light

# force output to the specified column width
# autoselected when <= 0
# default 0
terminalWidth: 0

# per-file threshold overrides
# per-file threshold overrides
# default {"statements": {}, "blocks": {}, "lines": {}, "functions": {}}
# disabled with 0
perFile:
  statements:
#    main.go: 0
#    cmd/root.go: 32
  blocks:
#    main.go: 0
#    cmd/root.go: 20
  lines:
#    main.go: 0
  functions:
#    main.go: 0
#    cmd/root.go: 80

# per-package threshold overrides
# default {"statements": {}, "blocks": {}, "lines": {}, "functions": {}}
# disabled with 0
perPackage:
  statements:
#    pkg/config: 10
  blocks:
#    pkg/config: 10
#    pkg/formatter: 0
  lines:
#    pkg/config: 10
  functions:
#    pkg/config: 50

# the total threshold overrides
# default {"statements": statementThreshold, "blocks": blockThreshold, "lines": lineThreshold, "functions": functionThreshold}
# disabled with 0
total:
  statements: 65.0
  blocks: 60
  lines: 70.0
  functions: 55.0

# skip package(s) and/or file(s) regex
# default []
skip:
#  - cmd/root.go

# git reference to diff from (enables diff-only mode)
# default "" (disabled)
diffFrom: ""
